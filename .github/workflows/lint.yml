name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff nbqa
      - name: Lint notebooks with ruff
        run: nbqa ruff "WEEK 3/LAB 3/relevance_scoring_rerankers.ipynb" --select E,W,F --ignore E501
